<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg"><title>ZenithFX — Trade The World</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#05080f;--bg1:#0b1120;--bg2:#111827;--bg3:#162035;--bg4:#1c2a40;--bg5:#243550;
  --z:#00e5b4;--z2:#00b8ff;--z3:#7c5cfc;--red:#ff4d6d;--green:#00d68f;
  --yellow:#fbbf24;--orange:#f97316;
  --t0:#f0f4ff;--t1:#c8d4ec;--t2:#7a90b4;--t3:#3f5070;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.14);
  --font:'Syne',sans-serif;--body:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r24:24px;--r50:50px;
  --shadow:0 4px 24px rgba(0,0,0,.5);--glow:0 0 24px rgba(0,229,180,.18);
  --sw:236px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--body);background:var(--bg0);color:var(--t0);font-size:14px;line-height:1.5}
button{cursor:pointer;font-family:var(--body)}
input,select{font-family:var(--body)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}

/* AUTH */
#auth{position:fixed;inset:0;background:var(--bg0);display:flex;align-items:center;justify-content:center;z-index:9999;background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,229,180,.12) 0%,transparent 70%)}
.auth-card{width:430px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r24);padding:34px;box-shadow:0 24px 80px rgba(0,0,0,.6);animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.auth-logo{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:26px}
.auth-icon{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--z),var(--z3));display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:19px;font-weight:800;color:#000}
.auth-name{font-family:var(--font);font-size:24px;font-weight:800}
.auth-name span{color:var(--z)}
.auth-tabs{display:flex;background:var(--bg3);border-radius:var(--r12);padding:4px;margin-bottom:22px}
.at{flex:1;padding:7px;border-radius:var(--r8);border:none;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:.18s;letter-spacing:.3px}
.at.on{background:var(--z);color:#000}
.at.off{background:transparent;color:var(--t2)}
.ftitle{font-family:var(--font);font-size:19px;font-weight:800;margin-bottom:4px}
.fsub{font-size:13px;color:var(--t2);margin-bottom:18px}
.flbl{font-size:10px;font-weight:700;color:var(--t2);margin-bottom:5px;display:block;letter-spacing:.5px;text-transform:uppercase}
.finp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r8);padding:10px 13px;color:var(--t0);font-size:13px;outline:none;transition:.18s}
.finp:focus{border-color:var(--z);box-shadow:0 0 0 3px rgba(0,229,180,.1)}
.finp::placeholder{color:var(--t3)}
.fsel{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r8);padding:10px 13px;color:var(--t0);font-size:13px;outline:none;cursor:pointer}
.fr{margin-bottom:12px}
.bz-full{width:100%;padding:12px;border-radius:var(--r12);border:none;background:linear-gradient(135deg,var(--z),#00c49a);color:#000;font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer;transition:.18s;box-shadow:0 4px 18px rgba(0,229,180,.3);letter-spacing:.3px}
.bz-full:hover{transform:translateY(-1px);box-shadow:0 7px 24px rgba(0,229,180,.4)}
.auth-div{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--t3);font-size:11px}
.auth-div::before,.auth-div::after{content:'';flex:1;height:1px;background:var(--border)}
.soc{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.soc-btn{padding:9px;border-radius:var(--r8);border:1px solid var(--border);background:var(--bg3);color:var(--t1);font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:.18s}
.soc-btn:hover{border-color:var(--border2);color:var(--t0)}
.auth-sw{font-size:12px;color:var(--t2);text-align:center;margin-top:14px;cursor:pointer}
.auth-sw span{color:var(--z);font-weight:700}
.auth-terms{font-size:10px;color:var(--t3);text-align:center;margin-top:12px;line-height:1.6}
.auth-terms span{color:var(--z2)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:38px}
.pw-eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t2);cursor:pointer;font-size:14px;padding:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}

/* ONBOARDING */
#onboard{position:fixed;inset:0;background:var(--bg0);display:none;align-items:center;justify-content:center;z-index:9998;background-image:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(124,92,252,.1) 0%,transparent 70%)}
.ob-card{width:550px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r24);padding:38px;box-shadow:var(--shadow);animation:fadeUp .35s ease}
.ob-dots{display:flex;justify-content:center;gap:7px;margin-bottom:28px}
.ob-dot{width:7px;height:7px;border-radius:50%;background:var(--bg5);transition:.3s}
.ob-dot.cur{background:var(--z);width:22px;border-radius:4px}
.ob-dot.dn{background:var(--green)}
.ob-title{font-family:var(--font);font-size:23px;font-weight:800;margin-bottom:7px;text-align:center}
.ob-sub{font-size:13px;color:var(--t2);text-align:center;margin-bottom:22px;line-height:1.6}
.ob-opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:22px}
.ob-opt{padding:15px;border-radius:var(--r12);border:2px solid var(--border);background:var(--bg3);cursor:pointer;transition:.18s;text-align:center}
.ob-opt:hover{border-color:var(--z)}
.ob-opt.sel{border-color:var(--z);background:rgba(0,229,180,.09)}
.ob-opt-icon{font-size:26px;margin-bottom:7px}
.ob-opt-lbl{font-size:13px;font-weight:700;font-family:var(--font)}
.ob-opt-sub{font-size:10px;color:var(--t2);margin-top:2px}
.ob-nav{display:flex;gap:9px;justify-content:center}

/* APP */
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sb{width:var(--sw);min-width:var(--sw);background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;transition:width .22s ease,min-width .22s ease;z-index:20}
#sb.col{width:58px;min-width:58px}
#sb.col .nl,.nl-badge,.nl-new,.acc-sw,.logo-tag,.logo-txt,.sb-btn-txt,.nav-sec{display:none!important}
#sb.col .ni{padding:10px;justify-content:center}
#sb.col .sb-logo{padding:14px;justify-content:center}
.sb-logo{padding:20px 17px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:center;gap:9px}
.logo-ic{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--z),var(--z3));display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:15px;font-weight:800;color:#000;flex-shrink:0}
.logo-txt{font-family:var(--font);font-size:18px;font-weight:800;letter-spacing:-.3px}
.logo-txt span{color:var(--z)}
.logo-tag{font-size:8px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-left:41px;margin-top:-2px}
.col-btn{background:none;border:none;color:var(--t3);font-size:14px;cursor:pointer;transition:.18s;padding:3px;line-height:1}
.col-btn:hover{color:var(--t0)}
.acc-sw{margin:11px;background:var(--bg3);border-radius:var(--r12);padding:13px;border:1px solid var(--border)}
.acc-email{font-size:10px;color:var(--t2);margin-bottom:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acc-tabs{display:flex;gap:4px;margin-bottom:10px}
.acc-tb{flex:1;padding:5px 0;border-radius:var(--r8);font-size:10px;font-weight:700;border:none;transition:.18s;font-family:var(--font);letter-spacing:.3px}
.acc-tb.da{background:var(--z);color:#000}
.acc-tb.la{background:var(--red);color:#fff}
.acc-tb.off{background:var(--bg4);color:var(--t2);border:1px solid var(--border)}
.acc-bal{font-family:var(--mono);font-size:20px;font-weight:500;letter-spacing:-.5px;transition:.3s}
.acc-lbl{font-size:9px;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.8px}
.acc-acts{display:flex;gap:4px;margin-top:9px}
.acc-act{flex:1;padding:4px;border-radius:var(--r8);border:1px solid var(--border);background:var(--bg4);color:var(--t2);font-size:9px;font-weight:700;transition:.18s}
.acc-act:hover{border-color:var(--z);color:var(--z)}
.nav-sec{padding:15px 17px 4px;font-size:8px;letter-spacing:1.8px;text-transform:uppercase;color:var(--t3);font-weight:700}
.ni{display:flex;align-items:center;gap:10px;padding:8px 13px;margin:1px 7px;border-radius:var(--r8);color:var(--t2);font-size:12px;font-weight:500;border:none;background:none;width:calc(100% - 14px);text-align:left;transition:.13s;cursor:pointer;font-family:var(--body)}
.ni:hover{background:var(--bg3);color:var(--t0)}
.ni.on{background:rgba(0,229,180,.09);color:var(--z);border:1px solid rgba(0,229,180,.14)}
.ni-icon{font-size:14px;width:17px;text-align:center;flex-shrink:0}
.nl{flex:1;font-size:12px}
.nl-badge{background:var(--red);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px}
.nl-new{background:var(--z3);color:#fff;font-size:7px;font-weight:700;padding:1px 4px;border-radius:3px;letter-spacing:.3px}
.sb-bot{margin-top:auto;padding:9px 7px 13px;border-top:1px solid var(--border)}
.sb-btn{display:flex;align-items:center;gap:9px;padding:7px 11px;border-radius:var(--r8);color:var(--t2);font-size:11px;border:none;background:none;width:100%;text-align:left;cursor:pointer;font-family:var(--body);transition:.15s}
.sb-btn:hover{background:var(--bg3);color:var(--t0)}
.sb-btn.danger:hover{color:var(--red);background:rgba(255,77,109,.08)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:52px;min-height:52px;background:var(--bg1);border-bottom:1px solid var(--border);gap:10px;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:9px}
.tb-right{display:flex;align-items:center;gap:7px}
.pg-title{font-family:var(--font);font-size:15px;font-weight:800}
.ticker-wrap{flex:1;overflow:hidden;position:relative}
.ticker-inner{display:flex;gap:22px;animation:mq 45s linear infinite;white-space:nowrap}
@keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tick-item{display:flex;align-items:center;gap:5px;font-size:10px}
.tick-sym{font-family:var(--font);font-weight:700;color:var(--t1)}
.tick-px{font-family:var(--mono);color:var(--t0)}
.tick-chg{font-weight:700;font-size:9px}
.tb-badge{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r50);padding:5px 12px}
.ld{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ld.dm{background:var(--z);box-shadow:0 0 7px var(--z)}
.ld.lv{background:var(--red);box-shadow:0 0 7px var(--red);animation:throb 1.2s infinite}
@keyframes throb{0%,100%{box-shadow:0 0 5px var(--red)}50%{box-shadow:0 0 13px var(--red)}}
.tb-bal{font-family:var(--mono);font-size:12px;font-weight:500}
.ib{width:32px;height:32px;border-radius:var(--r8);border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:.13s;color:var(--t2);position:relative}
.ib:hover{border-color:var(--z);color:var(--z)}
.nb{position:absolute;top:-4px;right:-4px;width:13px;height:13px;border-radius:50%;background:var(--red);color:#fff;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg1)}

#page{flex:1;overflow:hidden;display:flex;flex-direction:column}
.pi{flex:1;overflow-y:auto;padding:18px 20px}

/* COMPONENTS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r16);padding:18px}
.csm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r12);padding:14px}
.ct{font-family:var(--font);font-size:14px;font-weight:700;margin-bottom:3px}
.cs{font-size:11px;color:var(--t2)}
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:18px;font-size:10px;font-weight:700;letter-spacing:.2px}
.bg{background:rgba(0,214,143,.11);color:var(--green)}
.br{background:rgba(255,77,109,.11);color:var(--red)}
.by{background:rgba(251,191,36,.1);color:var(--yellow)}
.bz{background:rgba(0,229,180,.1);color:var(--z)}
.bz2{background:rgba(0,184,255,.1);color:var(--z2)}
.bz3{background:rgba(124,92,252,.11);color:var(--z3)}
.bo{background:rgba(249,115,22,.1);color:var(--orange)}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r12);padding:14px;transition:.18s}
.sc:hover{border-color:var(--border2)}
.sl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.sv{font-family:var(--mono);font-size:21px;font-weight:500;line-height:1}
.ss{font-size:10px;color:var(--t3);margin-top:4px}
.cg{color:var(--green)}.cr{color:var(--red)}.cz{color:var(--z)}.cz2{color:var(--z2)}.cz3{color:var(--z3)}.cy{color:var(--yellow)}.ct2{color:var(--t2)}.co{color:var(--orange)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r8);font-size:12px;font-weight:600;border:none;cursor:pointer;transition:.15s;font-family:var(--body)}
.btn-z{background:var(--z);color:#000}.btn-z:hover{background:#00ccaa;transform:translateY(-1px)}
.btn-ol{background:transparent;color:var(--t1);border:1px solid var(--border2)}.btn-ol:hover{border-color:var(--z);color:var(--z)}
.btn-gh{background:var(--bg3);color:var(--t1);border:1px solid var(--border)}.btn-gh:hover{border-color:var(--border2);color:var(--t0)}
.btn-dn{background:var(--red);color:#fff}.btn-dn:hover{background:#e03558}
.btn-z3{background:var(--z3);color:#fff}.btn-z3:hover{background:#6b4de8}
.btn-lg{padding:11px 22px;font-size:13px;border-radius:var(--r12)}
.btn-fw{width:100%;justify-content:center}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:6px}
.dv{height:1px;background:var(--border);margin:11px 0}
.flbl{font-size:10px;font-weight:700;color:var(--t2);margin-bottom:5px;display:block;letter-spacing:.4px;text-transform:uppercase}
.finp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r8);padding:9px 12px;color:var(--t0);font-size:13px;outline:none;transition:.15s}
.finp:focus{border-color:var(--z);box-shadow:0 0 0 3px rgba(0,229,180,.09)}
.finp::placeholder{color:var(--t3)}
.fsel{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r8);padding:9px 12px;color:var(--t0);font-size:13px;outline:none;cursor:pointer;-webkit-appearance:none}
.ab{border-radius:var(--r8);padding:9px 13px;margin-bottom:12px;font-size:11px;display:flex;gap:7px;align-items:flex-start;line-height:1.5;border:1px solid}
.aw{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.25);color:var(--yellow)}
.ai{background:rgba(0,229,180,.06);border-color:rgba(0,229,180,.18);color:var(--z)}
.ae{background:rgba(255,77,109,.07);border-color:rgba(255,77,109,.18);color:var(--red)}
.ap{background:rgba(124,92,252,.07);border-color:rgba(124,92,252,.18);color:var(--z3)}
.fl{display:flex}.ic{align-items:center}.jb{justify-content:space-between}
.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}
.tc{text-align:center}
.ems{text-align:center;padding:40px 0;color:var(--t2)}
.ems .ei{font-size:38px;margin-bottom:10px}
.ems .et{font-size:13px;font-weight:500;margin-bottom:3px;color:var(--t1)}
.ems .es{font-size:11px;color:var(--t3)}
.hl{transition:.18s}.hl:hover{transform:translateY(-2px)}
.gt{background:linear-gradient(135deg,var(--z),var(--z2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tag{display:inline-block;padding:4px 11px;border-radius:18px;font-size:10px;font-weight:700;border:1px solid;cursor:pointer;transition:.13s;font-family:var(--font)}
.tag.on{background:var(--z2);border-color:var(--z2);color:#fff}
.tag.off{background:transparent;border-color:var(--border2);color:var(--t2)}
.tag.off:hover{border-color:var(--z2);color:var(--z2)}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--z);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.pr{animation:pr 1.4s ease infinite}
@keyframes pr{0%{box-shadow:0 0 0 0 rgba(0,229,180,.5)}70%{box-shadow:0 0 0 8px rgba(0,229,180,0)}100%{box-shadow:0 0 0 0 rgba(0,229,180,0)}}
/* TRADE HUB */
#th{display:flex;flex-direction:column;height:100%;overflow:hidden}
.tt{display:flex;align-items:center;gap:7px;padding:7px 14px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.msel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r8);padding:5px 9px;color:var(--t0);font-size:11px;outline:none;cursor:pointer;max-width:190px}
.tc-chip{display:flex;align-items:center;gap:6px;background:var(--bg3);padding:4px 10px;border-radius:var(--r50);border:1px solid var(--border)}
.tc-sym{font-family:var(--font);font-size:12px;font-weight:700}
.tc-px{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--z)}
.tc-chg{font-size:9px;font-weight:700}
.tfs{display:flex;gap:2px;margin-left:auto}
.tfb{padding:3px 6px;border-radius:var(--r4);border:none;background:var(--bg4);color:var(--t2);font-size:9px;font-family:var(--mono);cursor:pointer;transition:.1s}
.tfb.atf,.tfb:hover{background:var(--z);color:#000}
.tb{flex:1;display:grid;grid-template-columns:1fr 288px;overflow:hidden;min-height:0}
.cs-wrap{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.ctb{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.ctb-btn{padding:3px 7px;border-radius:var(--r4);border:1px solid var(--border);background:var(--bg3);color:var(--t2);font-size:9px;cursor:pointer;transition:.1s}
.ctb-btn.act,.ctb-btn:hover{border-color:var(--z);color:var(--z)}
.cw{flex:1;position:relative;overflow:hidden;background:var(--bg0)}
#tc{display:block;width:100%;height:100%}
.co{position:absolute;top:9px;left:11px;pointer-events:none}
.co-p{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--z)}
.co-o{font-size:9px;color:var(--t2);margin-top:2px;font-family:var(--mono)}
.co-i{font-size:9px;color:var(--z3);font-family:var(--mono)}
.cst{position:absolute;bottom:7px;left:11px;display:flex;align-items:center;gap:5px;font-size:9px;color:var(--t2);background:rgba(5,8,15,.75);padding:3px 9px;border-radius:18px;backdrop-filter:blur(6px);border:1px solid var(--border)}

// ═══════════════ CHART ENGINE ═══════════════
function calcEMA(data,n=9){
  if(data.length<n)return data.slice();
  const k=2/(n+1);let e=data.slice(0,n).reduce((a,b)=>a+b)/n;
  const r=new Array(n).fill(null);r.push(e);
  for(let i=n;i<data.length;i++){e=data[i]*k+e*(1-k);r.push(e);}
  return r;
}
function initTradeHub(){
  const m=gm(S.mkt);S.price=m.price;S.chartData=[];
  let p=m.price;const v=VOLS[S.mkt]||.5;
  for(let i=0;i<120;i++){p=Math.max(.001,p+(Math.random()-.49)*v);S.chartData.push(p);}
  compDigits();startChart(v);updateOpenPos();
}
function compDigits(){
  const c=new Array(10).fill(0);
  S.digitHist.forEach(d=>c[d]++);
  S.digitProbs=c.map(x=>Math.round(x/S.digitHist.length*100)||10);
}
function startChart(v=.5){
  S.priceInt=setInterval(()=>{
    S.price=Math.max(.001,S.price+(Math.random()-.49)*v);
    S.chartData.push(S.price);if(S.chartData.length>200)S.chartData.shift();
    const ld=Math.floor(Math.abs(S.price*1000))%10;
    S.digitHist.push(ld);if(S.digitHist.length>60)S.digitHist.shift();
    compDigits();updatePriceUI();updateDigitUI();updateOpenPnl();
  },1000);
  function loop(){drawChart();S.rafId=requestAnimationFrame(loop);}
  S.rafId=requestAnimationFrame(loop);
}
function stopChart(){clearInterval(S.priceInt);S.priceInt=null;if(S.rafId){cancelAnimationFrame(S.rafId);S.rafId=null;}}
function drawChart(){
  const canvas=document.getElementById('tc');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.parentElement.offsetWidth||800,H=canvas.parentElement.offsetHeight||300;
  if(canvas.width!==W||canvas.height!==H){canvas.width=W;canvas.height=H;}
  const data=S.chartData;if(!data.length)return;
  const mn=Math.min(...data),mx=Math.max(...data);
  const range=(mx-mn)||1,pad=range*.12,lo=mn-pad,hi=mx+pad+pad;
  const toX=i=>(i/(data.length-1))*W;
  const toY=v=>H-((v-lo)/(hi-lo))*H;
  ctx.clearRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  for(let i=1;i<5;i++){const y=H*i/5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(let i=1;i<8;i++){const x=W*i/8;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  // Price axis
  ctx.fillStyle='rgba(120,145,180,0.45)';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';
  for(let i=0;i<=4;i++){const vv=lo+(hi-lo)*i/4;ctx.fillText(vv.toFixed(gm(S.mkt).pip||2),W-4,H-H*i/4-4);}
  ctx.textAlign='left';
  // Area
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(0,229,180,0.14)');grad.addColorStop(1,'rgba(0,229,180,0)');
  ctx.beginPath();ctx.moveTo(toX(0),toY(data[0]));
  data.forEach((v,i)=>{if(i>0)ctx.lineTo(toX(i),toY(v));});
  ctx.lineTo(toX(data.length-1),H);ctx.lineTo(0,H);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  // Line
  ctx.beginPath();ctx.moveTo(toX(0),toY(data[0]));
  data.forEach((v,i)=>{if(i>0)ctx.lineTo(toX(i),toY(v));});
  ctx.strokeStyle='#00e5b4';ctx.lineWidth=1.8;ctx.lineJoin='round';ctx.stroke();
  // EMA
  if(S.indicators.includes('EMA')){
    const ema=calcEMA(data,9);
    ctx.beginPath();let st=false;
    ema.forEach((v,i)=>{if(v===null)return;if(!st){ctx.moveTo(toX(i),toY(v));st=true;}else ctx.lineTo(toX(i),toY(v));});
    ctx.strokeStyle='rgba(124,92,252,0.75)';ctx.lineWidth=1.2;ctx.stroke();
  }
  if(S.indicators.includes('SMA')){
    const per=20;ctx.beginPath();let st=false;
    for(let i=per-1;i<data.length;i++){
      const avg=data.slice(i-per+1,i+1).reduce((a,b)=>a+b)/per;
      if(!st){ctx.moveTo(toX(i),toY(avg));st=true;}else ctx.lineTo(toX(i),toY(avg));
    }
    ctx.strokeStyle='rgba(251,191,36,0.65)';ctx.lineWidth=1.2;ctx.stroke();
  }
  if(S.indicators.includes('BB')){
    const per=20;
    for(let i=per-1;i<data.length;i++){
      const sl=data.slice(i-per+1,i+1);
      const avg=sl.reduce((a,b)=>a+b)/per;
      const std=Math.sqrt(sl.reduce((a,b)=>a+(b-avg)**2,0)/per);
      if(i===per-1){ctx.beginPath();ctx.moveTo(toX(i),toY(avg+2*std));}
      else ctx.lineTo(toX(i),toY(avg+2*std));
    }
    ctx.strokeStyle='rgba(0,184,255,0.4)';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();
    for(let i=per-1;i<data.length;i++){
      const sl=data.slice(i-per+1,i+1);
      const avg=sl.reduce((a,b)=>a+b)/per;
      const std=Math.sqrt(sl.reduce((a,b)=>a+(b-avg)**2,0)/per);
      if(i===per-1)ctx.moveTo(toX(i),toY(avg-2*std));
      else ctx.lineTo(toX(i),toY(avg-2*std));
    }
    ctx.strokeStyle='rgba(0,184,255,0.4)';ctx.lineWidth=1;ctx.stroke();
  }
  // Current price dot + label
  const lx=toX(data.length-1),ly=toY(S.price);
  ctx.beginPath();ctx.arc(lx,ly,6,0,Math.PI*2);ctx.fillStyle='rgba(0,229,180,0.18)';ctx.fill();
  ctx.beginPath();ctx.arc(lx,ly,3.5,0,Math.PI*2);ctx.fillStyle='#00e5b4';ctx.fill();
  ctx.fillStyle='rgba(0,229,180,0.92)';ctx.fillRect(W-70,ly-9,68,16);
  ctx.fillStyle='#000';ctx.font='bold 9px DM Mono,monospace';ctx.textAlign='center';
  ctx.fillText(S.price.toFixed(gm(S.mkt).pip||2),W-36,ly+4);ctx.textAlign='left';
  ctx.setLineDash([3,4]);ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W-72,ly);
  ctx.strokeStyle='rgba(0,229,180,0.22)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
}

function placeTrade(dir){
  const stake=parseFloat(document.getElementById('s-inp')?.value)||S.stake;
  const bal=getBal();
  if(stake<=0){toast('Enter a valid stake amount','e');return;}
  if(stake>bal){toast('Insufficient balance!','e');return;}
  const m=gm(S.mkt);
  showModal(`Confirm ${dir.toUpperCase()} Trade`,`Place $${stake.toFixed(2)} ${dir.toUpperCase()} on ${m.name}?\nPotential payout: $${(stake*1.85).toFixed(2)}`,()=>{
    setBal(Math.max(0,bal-stake));updateBal();
    const posId=Date.now();
    S.openPos.push({id:posId,mkt:m.id,mktId:m.id,dir,stake,entry:S.price});
    updateOpenPos();
    const dur=3000+Math.random()*5000;
    toast(`Trade placed — resolving in ~${Math.round(dur/1000)}s`,'i');
    setTimeout(()=>{
      const idx=S.openPos.findIndex(p=>p.id===posId);if(idx>=0)S.openPos.splice(idx,1);
      const win=Math.random()>0.46;const pnl=win?stake*.85:-stake;
      if(win)setBal(getBal()+(stake*1.85));
      updateBal();
      S.trades.unshift({id:Date.now(),time:new Date().toLocaleTimeString(),date:new Date().toLocaleDateString(),mkt:m.name,mktId:m.id,dir,stake,payout:win?stake*1.85:0,pnl,win,acct:S.acct});
      updateOpenPos();
      if(win)toast(`✓ WON! +$${(stake*.85).toFixed(2)} profit 🎉`,'s');
      else toast(`Trade lost. −$${stake.toFixed(2)}`,'e');
      if(S.pg==='dashboard')nav('dashboard');
    },dur);
  });
}

  if(S.acct==='demo'){toast('Switch to Live account to deposit real funds','e');return;}
  if(S.depMethod==='mpesa'){
    const ph=document.getElementById('mp-ph')?.value;
    const a=parseFloat(document.getElementById('mp-amt')?.value)||0;
    if(!ph){toast('Enter your M-Pesa phone number','e');return;}
    if(a<500){toast('Minimum deposit is KES 500','e');return;}
    const u=a/131.40;
    showModal('✅ M-Pesa STK Push Sent',`A payment request of KES ${a.toLocaleString()} ($${u.toFixed(2)}) has been sent to ${ph}. Enter your M-Pesa PIN on your phone to complete.`,()=>{

  const a=parseFloat(prompt('Enter deposit amount in USD (min $5):','100')||'0');
  if(!a||a<5){toast('Enter a valid amount (min $5)','e');return;}
  showModal('Confirm Deposit',`Deposit $${a.toFixed(2)} via ${S.depMethod}?`,()=>{S.liveBal+=a;updateBal();toast(`$${a.toFixed(2)} deposited successfully!`,'s');});
}

    Trading:`<div class="fr"><label class="flbl">Default Stake (USD)</label><input class="finp" type="number" value="${S.stake}" oninput="S.stake=parseFloat(this.value)||10"></div><div class="fr"><label class="flbl">Default Duration</label><select class="fsel"><option>1 tick</option><option>5 ticks</option><option selected>10 ticks</option><option>1 min</option></select></div><div class="fr"><label class="flbl">Default Market</label><select class="fsel"><option selected>Volatility 10 (1s) Index</option><option>Volatility 75 Index</option><option>EUR/USD</option></select></div>${[['Trade Confirmations','Show always','bg'],['Auto-close on daily loss limit','Disabled','br'],['Loss alerts','Enabled','bg'],['Chart type default','Line','bz']].map(([l,v,c])=>`<div class="fl ic jb" style="padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px">${l}</span><span class="bdg ${c}">${v}</span></div>`).join('')}<button class="btn btn-z mt12" onclick="toast('Trading prefs saved!','s')">Save Preferences</button>`,
    Privacy:`${[['Data Analytics & Tracking','Opt-in','bz'],['Marketing Communications','Opt-out','br'],['Third-party Data Sharing','Opt-out','br'],['Account Visibility','Private','bg'],['Activity Logging','Enabled','bz']].map(([l,v,c])=>`<div class="fl ic jb" style="padding:9px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px">${l}</span><div class="fl g6 ic"><span class="bdg ${c}">${v}</span><button class="btn btn-gh btn-sm" onclick="toast('Updated!','s')">Edit</button></div></div>`).join('')}<div class="ab ae mt12">⚠️ Account deletion is permanent. All funds must be withdrawn first.</div><button class="btn btn-dn btn-sm mt8" onclick="toast('Contact support to delete account','i')">Request Account Deletion</button>`,
    Appearance:`<div class="fr"><label class="flbl">Theme</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div onclick="${!S.light?'':toggleTheme()}" style="padding:13px;border-radius:var(--r12);border:2px solid ${!S.light?'var(--z)':'var(--border)'};background:${!S.light?'rgba(0,229,180,.07)':'var(--bg3)'};cursor:pointer;text-align:center" onclick="if(S.light)toggleTheme()"><div style="font-size:20px">🌙</div><div style="font-size:11px;font-weight:600;margin-top:5px">Dark Mode</div></div><div style="padding:13px;border-radius:var(--r12);border:2px solid ${S.light?'var(--z)':'var(--border)'};background:${S.light?'rgba(0,229,180,.07)':'var(--bg3)'};cursor:pointer;text-align:center" onclick="if(!S.light)toggleTheme()"><div style="font-size:20px">☀️</div><div style="font-size:11px;font-weight:600;margin-top:5px">Light Mode</div></div></div></div><div class="fr"><label class="flbl">Font Size</label><select class="fsel"><option>Small</option><option selected>Medium</option><option>Large</option></select></div><div class="fr"><label class="flbl">Default Chart</label><select class="fsel"><option selected>Line</option><option>Candlestick</option></select></div><button class="btn btn-z" onclick="toast('Appearance saved!','s')">Apply</button>`,
  };
  return`
<div class="set-grid">
  <div class="set-nav">${tabs.map(t=>`<button class="sni ${S.settingsTab===t?'on':''}" onclick="S.settingsTab='${t}';document.getElementById('pc').innerHTML=rSettings()">${t}</button>`).join('')}</div>
  <div class="set-body"><div style="font-family:var(--font);font-size:16px;font-weight:800;margin-bottom:14px">${st}</div>${content[st]||''}</div>
</div>`;
}

// ═══════════════ SIDEBAR / THEME / NOTIF ═══════════════
function toggleSB(){
  S.sbCol=!S.sbCol;
  document.getElementById('sb').classList.toggle('col',S.sbCol);
  document.getElementById('col-btn').textContent=S.sbCol?'▶':'◀';
}
function toggleMob(){document.getElementById('sb').classList.toggle('mob-open');}
function toggleTheme(){
  S.light=!S.light;document.body.classList.toggle('lt',S.light);
  document.getElementById('theme-lbl').textContent=S.light?'Dark Mode':'Light Mode';
  toast(S.light?'Light mode ☀':'Dark mode 🌙','i');
  if(S.settingsTab==='Appearance'&&S.pg==='settings')document.getElementById('pc').innerHTML=rSettings();
}
function toggleNotif(){
  S.notifOpen=!S.notifOpen;
  document.getElementById('np').classList.toggle('open',S.notifOpen);
  if(S.notifOpen){S.notifs.forEach(n=>n.read=true);buildNotifPanel();}
}

// ═══════════════ SIGN OUT ═══════════════
function doSignOut(){
  showModal('Sign Out','Are you sure you want to sign out of ZenithFX?',()=>{
    toast('Signed out successfully','i');
    setTimeout(()=>{
      document.getElementById('app').style.display='none';
      const a=document.getElementById('auth');a.style.display='flex';a.style.opacity='1';
      showAuth('login');
    },500);
  });
}

// ═══════════════ TOAST ═══════════════
function toast(msg,type='s'){
  const icons={s:'✓',e:'✕',i:'ℹ',w:'⚠'};
  const cls={s:'ts',e:'te',i:'ti',w:'tw'};
  const tc=document.getElementById('tc-wrap');
  const el=document.createElement('div');
  el.className=`toast ${cls[type]||'ti'}`;
  el.innerHTML=`<span style="font-size:13px">${icons[type]||'•'}</span><span style="color:var(--t0);line-height:1.4">${msg}</span>`;
  tc.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),280);},3500);
}

// ═══════════════ MODAL ═══════════════
let _mcb=null;
function showModal(title,body,onConfirm){
  document.getElementById('m-title').textContent=title;
  document.getElementById('m-body').textContent=body;
  document.getElementById('mo').classList.add('open');
  _mcb=onConfirm;
  document.getElementById('m-ok').onclick=()=>{closeModal();if(_mcb)_mcb();};
}
function closeModal(){document.getElementById('mo').classList.remove('open');}

// ═══════════════ INIT ═══════════════
showAuth('login');

// Close panels on outside click
document.addEventListener('click',e=>{
  if(S.notifOpen&&!document.getElementById('np').contains(e.target)&&!e.target.closest('[title="Notifications"]')){
    S.notifOpen=false;document.getElementById('np').classList.remove('open');
  }
  const sb=document.getElementById('sb');
  if(sb.classList.contains('mob-open')&&!sb.contains(e.target)&&!e.target.closest('#mob-btn')){
    sb.classList.remove('mob-open');
  }
});
</script>
