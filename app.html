<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenithFX — Trader's Hub</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   RESET & VARIABLES
═══════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  /* Dark deep navy palette */
  --bg0:#04070f;
  --bg1:#07101e;
  --bg2:#0a1628;
  --bg3:#0e1d34;
  --bg4:#132540;
  --bg5:#1a2f50;
  /* Accent colors */
  --z:#00f0be;
  --z-dim:rgba(0,240,190,.12);
  --z-glow:rgba(0,240,190,.25);
  --z2:#00c4ff;
  --z3:#8b5cf6;
  --green:#00e676;
  --red:#ff4569;
  --yellow:#fbbf24;
  --orange:#f97316;
  /* Text */
  --t0:#ffffff;
  --t1:#d8e6ff;
  --t2:#7a9cc4;
  --t3:#3a5278;
  /* Borders */
  --b1:rgba(255,255,255,0.07);
  --b2:rgba(255,255,255,0.14);
  --b3:rgba(0,240,190,0.2);
  /* Fonts */
  --font:'Syne',sans-serif;
  --body:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
  /* Sizes */
  --sidebar:242px;
  --topbar:56px;
  --radius:10px;
  --radius-lg:16px;
  --radius-xl:22px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--body);background:var(--bg0);color:var(--t0);font-size:14px;line-height:1.5}
button{cursor:pointer;font-family:var(--body);outline:none}
input,select,textarea{font-family:var(--body);outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
#app{display:flex;height:100vh;overflow:hidden}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
#sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--bg1);
  border-right:1px solid var(--b1);
  display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
  transition:width .22s ease,min-width .22s ease;
  position:relative;z-index:20;flex-shrink:0;
}
#sidebar.col{width:60px;min-width:60px}
#sidebar.col .sb-hide{display:none!important}
#sidebar.col .nav-item{padding:10px;justify-content:center}
#sidebar.col .nav-icon{width:auto}
#sidebar.col .sb-logo{padding:14px 0;justify-content:center}
#sidebar.col .acc-card{margin:8px 6px;padding:10px 6px}
#sidebar.col .acc-bal{font-size:14px}

/* Logo */
.sb-logo{
  padding:18px 18px 16px;
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between;
}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--z),var(--z3));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font);font-size:16px;font-weight:800;color:#000;
  box-shadow:0 3px 12px rgba(0,240,190,.4);
}
.logo-text{font-family:var(--font);font-size:18px;font-weight:800;letter-spacing:-.3px;white-space:nowrap}
.logo-text span{color:var(--z)}
.logo-tag{font-size:8px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-left:44px;margin-top:-3px}
.col-btn{
  background:none;border:none;color:var(--t3);
  font-size:13px;cursor:pointer;padding:4px;
  transition:.15s;line-height:1;border-radius:6px;
}
.col-btn:hover{color:var(--t0);background:var(--bg4)}

/* Account card */
.acc-card{
  margin:12px;background:var(--bg3);
  border-radius:var(--radius-lg);padding:14px;
  border:1px solid var(--b1);
}
.acc-email{font-size:10px;color:var(--t2);margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acc-mode-row{display:flex;gap:5px;margin-bottom:12px}
.acc-tb{
  flex:1;padding:6px 0;border-radius:8px;
  font-size:10px;font-weight:700;letter-spacing:.3px;
  border:none;transition:.18s;font-family:var(--font);
}
.acc-tb.d-on{background:var(--z);color:#000;box-shadow:0 2px 10px rgba(0,240,190,.4)}
.acc-tb.l-on{background:var(--red);color:#fff;box-shadow:0 2px 10px rgba(255,69,105,.4)}
.acc-tb.off{background:var(--bg4);color:var(--t2);border:1px solid var(--b1)}
.acc-tb.off:hover{border-color:var(--b2);color:var(--t1)}
.acc-bal{
  font-family:var(--mono);font-size:22px;font-weight:500;
  letter-spacing:-.5px;color:var(--t0);
  transition:.3s;
}
.acc-label{font-size:9px;color:var(--t3);margin-top:3px;text-transform:uppercase;letter-spacing:.8px}
.acc-actions{display:flex;gap:5px;margin-top:11px}
.acc-act{
  flex:1;padding:5px;border-radius:7px;
  border:1px solid var(--b1);background:var(--bg4);
  color:var(--t2);font-size:10px;font-weight:600;
  transition:.15s;
}
.acc-act:hover{border-color:var(--z);color:var(--z);background:var(--z-dim)}

/* Nav */
.nav-sec{
  padding:16px 18px 4px;
  font-size:8px;letter-spacing:2px;text-transform:uppercase;
  color:var(--t3);font-weight:700;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;margin:1px 8px;
  border-radius:var(--radius);
  color:var(--t2);font-size:13px;font-weight:500;
  border:none;background:none;width:calc(100% - 16px);
  text-align:left;transition:.15s;cursor:pointer;
  font-family:var(--body);position:relative;
}
.nav-item:hover{background:var(--bg3);color:var(--t0)}
.nav-item.on{
  background:rgba(0,240,190,.1);color:var(--z);
  border:1px solid rgba(0,240,190,.18);
}
.nav-item.on .nav-icon{color:var(--z)}
.nav-icon{font-size:15px;width:17px;text-align:center;flex-shrink:0}
.nav-label{flex:1;white-space:nowrap}
.nav-badge{
  background:var(--red);color:#fff;
  font-size:8px;font-weight:800;
  padding:1px 5px;border-radius:8px;letter-spacing:.2px;
}
.nav-pill{
  background:var(--z3);color:#fff;
  font-size:7px;font-weight:800;
  padding:1px 5px;border-radius:4px;letter-spacing:.3px;text-transform:uppercase;
}

/* Sidebar bottom */
.sb-bottom{
  margin-top:auto;padding:10px 8px 14px;
  border-top:1px solid var(--b1);
}
.sb-btn{
  display:flex;align-items:center;gap:9px;
  padding:8px 12px;border-radius:var(--radius);
  color:var(--t2);font-size:12px;border:none;background:none;
  width:100%;text-align:left;cursor:pointer;
  font-family:var(--body);transition:.15s;
}
.sb-btn:hover{background:var(--bg3);color:var(--t0)}
.sb-btn.danger:hover{color:var(--red);background:rgba(255,69,105,.08)}

/* ═══════════════════════════════════════
   MAIN AREA
═══════════════════════════════════════ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Topbar */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:var(--topbar);min-height:var(--topbar);
  background:var(--bg1);border-bottom:1px solid var(--b1);
  gap:12px;flex-shrink:0;
}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-right{display:flex;align-items:center;gap:8px}
.pg-title{font-family:var(--font);font-size:16px;font-weight:800;color:var(--t0);white-space:nowrap}
.ticker-wrap{flex:1;overflow:hidden;min-width:0}
.ticker-track{display:flex;gap:24px;animation:tk 45s linear infinite;white-space:nowrap;width:max-content}
@keyframes tk{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tk-item{display:flex;align-items:center;gap:6px;font-size:11px;flex-shrink:0}
.tk-sym{font-family:var(--font);font-weight:700;color:var(--t1)}
.tk-px{font-family:var(--mono);color:var(--t0)}
.tk-up{font-size:9px;font-weight:700;color:var(--green);background:rgba(0,230,118,.1);padding:2px 6px;border-radius:4px}
.tk-dn{font-size:9px;font-weight:700;color:var(--red);background:rgba(255,69,105,.1);padding:2px 6px;border-radius:4px}
.tb-badge{
  display:flex;align-items:center;gap:7px;
  background:var(--bg3);border:1px solid var(--b1);
  border-radius:50px;padding:6px 14px;flex-shrink:0;
}
.tb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tb-dot.dm{background:var(--z);box-shadow:0 0 8px var(--z)}
.tb-dot.lv{background:var(--red);animation:pulse-dot 1.3s infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(255,69,105,.6)}70%{box-shadow:0 0 0 8px rgba(255,69,105,0)}}
.tb-bal{font-family:var(--mono);font-size:13px;font-weight:500}
.ib{
  width:34px;height:34px;border-radius:var(--radius);
  border:1px solid var(--b1);background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;cursor:pointer;transition:.15s;color:var(--t2);
  position:relative;flex-shrink:0;
}
.ib:hover{border-color:var(--b3);color:var(--z);background:var(--z-dim)}
.ib-badge{
  position:absolute;top:-4px;right:-4px;
  width:15px;height:15px;border-radius:50%;
  background:var(--red);color:#fff;
  font-size:8px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg1);
}

/* Page area */
#page{flex:1;overflow:hidden;display:flex;flex-direction:column}
.page-inner{flex:1;overflow-y:auto;padding:20px 22px}

/* ═══════════════════════════════════════
   COMPONENT LIBRARY
═══════════════════════════════════════ */
/* Cards */
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--radius-lg);padding:20px;transition:.2s}
.card:hover{border-color:var(--b2)}
.card-sm{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--radius);padding:16px}
.card-title{font-family:var(--font);font-size:15px;font-weight:700;color:var(--t0);margin-bottom:4px}
.card-sub{font-size:12px;color:var(--t2)}

/* Badges */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.2px}
.bg{background:rgba(0,230,118,.1);color:var(--green)}
.br{background:rgba(255,69,105,.1);color:var(--red)}
.by{background:rgba(251,191,36,.09);color:var(--yellow)}
.bz{background:rgba(0,240,190,.1);color:var(--z)}
.bz2{background:rgba(0,196,255,.1);color:var(--z2)}
.bz3{background:rgba(139,92,246,.1);color:var(--z3)}
.bo{background:rgba(249,115,22,.09);color:var(--orange)}

/* Stat grid */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{
  background:var(--bg2);border:1px solid var(--b1);
  border-radius:var(--radius-lg);padding:18px;transition:.2s;
  position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--z),transparent);
  opacity:0;transition:.2s;
}
.stat-card:hover{border-color:var(--b2);transform:translateY(-2px)}
.stat-card:hover::before{opacity:1}
.sl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.sv{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1}
.ss{font-size:10px;color:var(--t3);margin-top:5px}
.cg{color:var(--green)}.cr{color:var(--red)}.cz{color:var(--z)}.cz2{color:var(--z2)}.cz3{color:var(--z3)}.cy{color:var(--yellow)}.ct2{color:var(--t2)}.co{color:var(--orange)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;border:none;cursor:pointer;transition:.18s;font-family:var(--body)}
.btn-z{background:var(--z);color:#000;box-shadow:0 3px 12px rgba(0,240,190,.3)}
.btn-z:hover{background:#00d9a8;transform:translateY(-1px);box-shadow:0 5px 18px rgba(0,240,190,.4)}
.btn-outline{background:transparent;color:var(--t1);border:1px solid var(--b2)}
.btn-outline:hover{border-color:var(--z);color:var(--z);background:var(--z-dim)}
.btn-ghost{background:var(--bg3);color:var(--t1);border:1px solid var(--b1)}
.btn-ghost:hover{border-color:var(--b2);color:var(--t0)}
.btn-danger{background:var(--red);color:#fff;box-shadow:0 3px 12px rgba(255,69,105,.3)}
.btn-danger:hover{background:#e03050}
.btn-z3{background:var(--z3);color:#fff}
.btn-z3:hover{background:#7a4ee0}
.btn-lg{padding:12px 24px;font-size:14px;border-radius:var(--radius-lg)}
.btn-fw{width:100%;justify-content:center}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:7px}

/* Forms */
.fr{margin-bottom:13px}
.flbl{font-size:10px;font-weight:700;color:var(--t2);margin-bottom:6px;display:block;letter-spacing:.5px;text-transform:uppercase}
.finp{
  width:100%;background:var(--bg3);border:1px solid var(--b1);
  border-radius:var(--radius);padding:10px 14px;
  color:var(--t0);font-size:13px;transition:.18s;
}
.finp:focus{border-color:var(--z);box-shadow:0 0 0 3px rgba(0,240,190,.1)}
.finp::placeholder{color:var(--t3)}
.fsel{
  width:100%;background:var(--bg3);border:1px solid var(--b1);
  border-radius:var(--radius);padding:10px 14px;
  color:var(--t0);font-size:13px;cursor:pointer;-webkit-appearance:none;
  transition:.18s;
}
.fsel:focus{border-color:var(--z)}

/* Alert boxes */
.ab{border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;font-size:12px;display:flex;gap:8px;align-items:flex-start;line-height:1.6;border:1px solid}
.aw{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.25);color:var(--yellow)}
.ai{background:rgba(0,240,190,.06);border-color:rgba(0,240,190,.2);color:var(--z)}
.ae{background:rgba(255,69,105,.07);border-color:rgba(255,69,105,.2);color:var(--red)}
.ap{background:rgba(139,92,246,.07);border-color:rgba(139,92,246,.2);color:var(--z3)}

/* Divider */
.dv{height:1px;background:var(--b1);margin:12px 0}

/* Tag filter */
.tag{display:inline-block;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid;cursor:pointer;transition:.15s;font-family:var(--font)}
.tag.on{background:var(--z2);border-color:var(--z2);color:#000}
.tag.off{background:transparent;border-color:var(--b2);color:var(--t2)}
.tag.off:hover{border-color:var(--z2);color:var(--z2)}

/* Utilities */
.fl{display:flex}.ic{align-items:center}.jb{justify-content:space-between}
.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt14{margin-top:14px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}
.tc{text-align:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Empty state */
.ems{text-align:center;padding:44px 0;color:var(--t2)}
.ems-i{font-size:40px;margin-bottom:12px}
.ems-t{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--t1)}
.ems-s{font-size:12px;color:var(--t3)}

/* Lift hover */
.hl{transition:.18s}.hl:hover{transform:translateY(-2px)}

/* ═══════════════════════════════════════
   TRADING HUB
═══════════════════════════════════════ */
#th{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* Trade topbar */
.tt{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:8px 16px;background:var(--bg1);
  border-bottom:1px solid var(--b1);flex-shrink:0;
}
.msel{
  background:var(--bg3);border:1px solid var(--b1);
  border-radius:var(--radius);padding:6px 10px;
  color:var(--t0);font-size:12px;cursor:pointer;
  max-width:200px;transition:.15s;
}
.msel:focus{border-color:var(--z)}
.tc-chip{
  display:flex;align-items:center;gap:7px;
  background:var(--bg3);padding:5px 12px;
  border-radius:50px;border:1px solid var(--b1);
}
.tc-sym{font-family:var(--font);font-size:13px;font-weight:800;color:var(--t0)}
.tc-px{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--z)}
.tc-chg{font-size:10px;font-weight:700}
.tf-row{display:flex;gap:3px;margin-left:auto}
.tf-btn{
  padding:4px 8px;border-radius:5px;border:none;
  background:var(--bg4);color:var(--t2);
  font-size:10px;font-family:var(--mono);cursor:pointer;transition:.12s;
}
.tf-btn.on,.tf-btn:hover{background:var(--z);color:#000;font-weight:700}

/* Chart area */
.trade-body{flex:1;display:grid;grid-template-columns:1fr 292px;overflow:hidden;min-height:0}
.chart-col{display:flex;flex-direction:column;border-right:1px solid var(--b1);overflow:hidden;background:var(--bg0)}

/* Chart toolbar */
.ct-bar{
  display:flex;align-items:center;gap:5px;flex-wrap:wrap;
  padding:6px 12px;background:var(--bg1);
  border-bottom:1px solid var(--b1);flex-shrink:0;
}
.ct-sep{width:1px;height:16px;background:var(--b1);margin:0 4px}
.ct-btn{
  padding:3px 9px;border-radius:5px;border:1px solid var(--b1);
  background:var(--bg3);color:var(--t2);font-size:10px;
  cursor:pointer;transition:.12s;font-family:var(--body);
}
.ct-btn.on,.ct-btn:hover{border-color:var(--z);color:var(--z);background:var(--z-dim)}

/* Canvas */
.chart-wrap{flex:1;position:relative;overflow:hidden}
#tc{display:block;width:100%;height:100%}
.chart-overlay{position:absolute;top:10px;left:12px;pointer-events:none}
.co-px{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--z);text-shadow:0 2px 10px rgba(0,240,190,.4)}
.co-ohlc{font-size:9px;color:var(--t2);font-family:var(--mono);margin-top:3px}
.co-inds{font-size:9px;color:var(--z3);font-family:var(--mono);margin-top:1px}
.chart-status{
  position:absolute;bottom:8px;left:12px;
  display:flex;align-items:center;gap:6px;
  font-size:10px;color:var(--t2);
  background:rgba(4,7,15,.8);
  padding:4px 11px;border-radius:20px;
  border:1px solid var(--b1);
  backdrop-filter:blur(6px);
}
.cs-dot{width:5px;height:5px;border-radius:50%;background:var(--z);animation:blink 1.3s infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,240,190,.5)}60%{box-shadow:0 0 0 6px rgba(0,240,190,0)}}

/* Digit panel */
.dp{padding:10px 12px;background:var(--bg1);border-top:1px solid var(--b1);flex-shrink:0}
.dp-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.dp-title{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.dp-sel{font-size:11px;color:var(--z);font-family:var(--mono);font-weight:500}
.dg{display:flex;gap:4px}
.dc{
  flex:1;background:var(--bg3);border:1px solid var(--b1);
  border-radius:var(--radius);padding:7px 3px;
  text-align:center;cursor:pointer;transition:.15s;
}
.dc:hover{border-color:var(--z2)}
.dc.sd{background:rgba(0,240,190,.12);border-color:var(--z);box-shadow:0 0 0 1px rgba(0,240,190,.2)}
.dc-n{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--t1)}
.dc.sd .dc-n{color:var(--z)}
.dc-p{font-size:8px;color:var(--t3);margin-top:2px}
.dc.sd .dc-p{color:var(--z)}
.dc-bar{height:2px;background:var(--bg5);border-radius:1px;margin-top:3px;overflow:hidden}
.dc-fill{height:100%;background:var(--z3);border-radius:1px;transition:width .5s}
.dc.sd .dc-fill{background:var(--z)}

/* Positions panel */
.pos-panel{
  height:138px;border-top:1px solid var(--b1);
  background:var(--bg1);flex-shrink:0;
  display:flex;flex-direction:column;overflow:hidden;
}
.pp-tabs{display:flex;border-bottom:1px solid var(--b1)}
.pp-tab{
  padding:8px 14px;font-size:10px;font-weight:700;
  font-family:var(--font);color:var(--t2);
  border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;transition:.13s;letter-spacing:.3px;
}
.pp-tab.on{color:var(--z);border-bottom-color:var(--z)}
.pp-content{flex:1;overflow-y:auto;padding:5px 8px}
.pos-row{
  display:grid;grid-template-columns:22px 1fr auto auto auto;
  gap:8px;align-items:center;padding:6px 8px;
  border-radius:var(--radius);font-size:11px;
  background:var(--bg3);margin-bottom:4px;
  border:1px solid var(--b1);transition:.13s;
}
.pos-row:hover{border-color:var(--b2)}
.pd{
  width:22px;height:22px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;flex-shrink:0;
}
.pd.rise{background:rgba(0,230,118,.14);color:var(--green)}
.pd.fall{background:rgba(255,69,105,.14);color:var(--red)}
.pos-close{
  padding:2px 8px;border-radius:4px;border:1px solid var(--b1);
  background:var(--bg4);color:var(--t2);
  font-size:9px;cursor:pointer;font-weight:700;transition:.12s;
}
.pos-close:hover{border-color:var(--red);color:var(--red)}

/* Trade panel */
.tp{display:flex;flex-direction:column;overflow-y:auto;background:var(--bg1);border-left:1px solid var(--b1)}
.tp-tabs{display:flex;border-bottom:1px solid var(--b1);flex-shrink:0}
.tp-tab{
  flex:1;padding:10px 4px;text-align:center;
  font-size:10px;font-weight:700;font-family:var(--font);
  color:var(--t2);border:none;background:none;
  cursor:pointer;border-bottom:2px solid transparent;
  transition:.13s;letter-spacing:.3px;
}
.tp-tab.on{color:var(--z);border-bottom-color:var(--z)}
.tp-sec{padding:12px}
.tp-lbl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px}
.mode-btn{
  padding:7px;border-radius:var(--radius);
  border:1px solid var(--b1);background:var(--bg3);
  color:var(--t2);font-size:10px;font-weight:700;
  font-family:var(--font);cursor:pointer;transition:.15s;text-align:center;
}
.mode-btn.on{border-color:var(--z);color:var(--z);background:var(--z-dim)}
.ty-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.ty-chip{
  padding:5px 10px;border-radius:20px;border:1px solid var(--b1);
  background:var(--bg3);color:var(--t2);font-size:10px;
  font-weight:600;cursor:pointer;transition:.13s;
}
.ty-chip.on{background:var(--z2);border-color:var(--z2);color:#000;font-weight:700}
.ty-chip:hover:not(.on){border-color:var(--z2);color:var(--z2)}
.dur-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:12px}
.dur-btn{
  padding:3px 8px;border-radius:5px;border:1px solid var(--b1);
  background:var(--bg3);color:var(--t2);
  font-size:9px;font-weight:600;cursor:pointer;transition:.12s;
  font-family:var(--mono);
}
.dur-btn.on,.dur-btn:hover{border-color:var(--z);color:var(--z)}
.qs-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
.qs-btn{
  padding:3px 8px;border-radius:5px;border:1px solid var(--b1);
  background:var(--bg3);color:var(--t2);
  font-size:9px;font-weight:600;cursor:pointer;
  transition:.12s;font-family:var(--mono);
}
.qs-btn:hover{border-color:var(--z);color:var(--z)}
.stake-wrap{position:relative;margin-bottom:10px}
.stake-inp{
  width:100%;background:var(--bg3);border:1px solid var(--b1);
  border-radius:var(--radius);padding:10px 42px 10px 12px;
  color:var(--t0);font-family:var(--mono);font-size:15px;
  font-weight:500;transition:.15s;
}
.stake-inp:focus{border-color:var(--z);box-shadow:0 0 0 3px rgba(0,240,190,.1)}
.stake-cur{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  font-size:10px;color:var(--t2);font-weight:700;pointer-events:none;
}
.payout-box{
  background:var(--bg0);border-radius:var(--radius-lg);
  padding:12px;border:1px solid var(--b1);margin-bottom:10px;
}
.pb-r{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.pb-r:last-child{margin-bottom:0}
.pb-l{font-size:10px;color:var(--t2)}
.pb-v{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--green)}
.pb-m{font-size:9px;color:var(--t3)}
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.ef label{font-size:8px;color:var(--t2);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.ef input{
  width:100%;background:var(--bg3);border:1px solid var(--b1);
  border-radius:5px;padding:5px 8px;color:var(--t0);
  font-family:var(--mono);font-size:11px;transition:.12s;
}
.ef input:focus{border-color:var(--z)}
.risk-row{display:flex;justify-content:space-between;font-size:10px;color:var(--t2);padding-bottom:8px}

/* Trade action buttons */
.act-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px 12px}
.trade-btn{
  padding:13px 8px;border-radius:var(--radius-lg);
  border:none;cursor:pointer;font-family:var(--font);
  font-size:12px;font-weight:800;transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  letter-spacing:.3px;
}
.rise-btn{background:linear-gradient(145deg,#00f0be,#00b894);color:#000;box-shadow:0 4px 16px rgba(0,240,190,.35)}
.rise-btn:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,240,190,.5)}
.rise-btn:active{transform:translateY(0)}
.fall-btn{background:linear-gradient(145deg,#ff4569,#cc2244);color:#fff;box-shadow:0 4px 16px rgba(255,69,105,.35)}
.fall-btn:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(255,69,105,.5)}
.fall-btn:active{transform:translateY(0)}
.btn-sub{font-size:9px;opacity:.8;font-family:var(--mono)}

/* Util btns */
.util-btns{padding:0 12px 12px;display:flex;flex-direction:column;gap:5px}
.util{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:8px;border-radius:var(--radius);
  border:1px solid var(--b1);background:var(--bg3);
  color:var(--t2);font-size:11px;font-weight:600;
  cursor:pointer;transition:.15s;
}
.util:hover{border-color:var(--z);color:var(--z);background:var(--z-dim)}

/* ═══════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════ */
.dash-grid{display:grid;grid-template-columns:1fr 308px;gap:14px}
.dash-l{display:flex;flex-direction:column;gap:12px}
.dash-r{display:flex;flex-direction:column;gap:12px}
.mq-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mq-card{
  background:var(--bg3);border:1px solid var(--b1);
  border-radius:var(--radius-lg);padding:13px;
  cursor:pointer;transition:.2s;
}
.mq-card:hover{border-color:var(--b3);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.35)}
.mq-ic{font-size:18px;margin-bottom:6px}
.mq-id{font-family:var(--font);font-size:11px;font-weight:800;color:var(--t0);margin-bottom:1px}
.mq-nm{font-size:8px;color:var(--t2);margin-bottom:4px}
.mq-px{font-family:var(--mono);font-size:12px;color:var(--z);margin-top:4px}
.mq-chg{font-size:9px;font-weight:700}
.th-list{display:flex;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto}
.th-row{
  display:flex;align-items:center;gap:9px;
  background:var(--bg3);border-radius:var(--radius);
  padding:9px 12px;border:1px solid var(--b1);transition:.13s;
}
.th-row:hover{border-color:var(--b2)}
.th-dir{
  width:26px;height:26px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;flex-shrink:0;
}
.th-dir.rise{background:rgba(0,230,118,.13);color:var(--green)}
.th-dir.fall{background:rgba(255,69,105,.13);color:var(--red)}
.th-info{flex:1;min-width:0}
.th-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t0)}
.th-meta{font-size:10px;color:var(--t2)}
.th-pnl{font-family:var(--mono);font-size:12px;font-weight:500}
.th-pnl.w{color:var(--green)}.th-pnl.l{color:var(--red)}

/* ═══════════════════════════════════════
   MARKETS PAGE
═══════════════════════════════════════ */
.mk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px}
.mk-card{
  background:var(--bg2);border:1px solid var(--b1);
  border-radius:var(--radius-lg);padding:14px;
  cursor:pointer;transition:.2s;
}
.mk-card:hover{border-color:var(--b3);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.mk-ic{font-size:22px;margin-bottom:9px}
.mk-id{font-family:var(--font);font-size:12px;font-weight:800;margin-bottom:2px}
.mk-nm{font-size:10px;color:var(--t2);margin-bottom:8px}
.mk-px{font-family:var(--mono);font-size:14px;font-weight:500}
.mk-chg{font-size:10px;font-weight:700;margin-top:3px}

/* ═══════════════════════════════════════
   COPY TRADING
═══════════════════════════════════════ */
.copy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.copy-card{
  background:var(--bg2);border:1px solid var(--b1);
  border-radius:var(--radius-xl);padding:18px;transition:.2s;
}
.copy-card:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:0 16px 50px rgba(0,0,0,.4)}
.ca-av{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font);font-size:16px;font-weight:800;color:#000;flex-shrink:0;
}
.ca-name{font-family:var(--font);font-size:13px;font-weight:800;color:var(--t0)}
.ca-handle{font-size:10px;color:var(--t2)}
.ca-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.cas{text-align:center;background:var(--bg3);border-radius:var(--radius);padding:8px 4px}
.cas-l{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.cas-v{font-family:var(--mono);font-size:12px;font-weight:500}

/* ═══════════════════════════════════════
   JOURNAL
═══════════════════════════════════════ */
.jt{width:100%;border-collapse:collapse}
.jt th{padding:9px 12px;text-align:left;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--b1)}
.jt td{padding:9px 12px;font-size:12px;border-bottom:1px solid var(--b1)}
.jt tr:hover td{background:var(--bg3)}

/* ═══════════════════════════════════════
   KYC
═══════════════════════════════════════ */
.kyc-w{max-width:560px}
.pb-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--z),var(--z2));border-radius:3px;transition:width .6s}
.kyc-step{
  display:flex;align-items:center;gap:13px;
  background:var(--bg2);border:1px solid var(--b1);
  border-radius:var(--radius-lg);padding:15px;
  margin-bottom:9px;transition:.18s;
}
.kyc-step:hover{border-color:var(--b2)}
.sn{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--mono);
}
.s-done{background:rgba(0,230,118,.13);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.s-pend{background:var(--bg3);color:var(--t2);border:1px solid var(--b1)}
.s-act{background:rgba(0,196,255,.11);color:var(--z2);border:1px solid rgba(0,196,255,.25)}
.s-info h4{font-size:13px;font-weight:600;margin-bottom:2px;color:var(--t0)}
.s-info p{font-size:11px;color:var(--t2)}
.s-act-btn{
  padding:6px 14px;border-radius:var(--radius);
  font-size:10px;font-weight:700;font-family:var(--font);
  cursor:pointer;transition:.15s;border:none;letter-spacing:.3px;
}
.sab-done{background:rgba(0,230,118,.1);color:var(--green)}
.sab-go{background:var(--z2);color:#000}
.sab-go:hover{background:#00d4ff}

/* ═══════════════════════════════════════
   AFFILIATE
═══════════════════════════════════════ */
.aff-hero{
  background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(0,240,190,.07));
  border:1px solid rgba(139,92,246,.2);border-radius:var(--radius-xl);padding:28px;margin-bottom:14px;
}
.ref-box{
  background:var(--bg3);border-radius:var(--radius);padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border:1px solid var(--b1);font-family:var(--mono);font-size:12px;color:var(--z);
}

/* ═══════════════════════════════════════
   LOYALTY
═══════════════════════════════════════ */
.lt-grid{display:flex;flex-direction:column;gap:10px;max-width:500px}
.lt-card{
  display:flex;align-items:center;gap:15px;
  background:var(--bg2);border:1px solid var(--b1);
  border-radius:var(--radius-lg);padding:16px;transition:.2s;
}
.lt-ic{font-size:26px;flex-shrink:0}
.lt-name{font-family:var(--font);font-size:14px;font-weight:800;margin-bottom:2px}
.lt-perks{font-size:11px;color:var(--t2)}
.lt-min{font-size:10px;color:var(--t3);margin-top:3px}

/* ═══════════════════════════════════════
   PROFILE
═══════════════════════════════════════ */
.p-wrap{max-width:500px}
.p-hero{
  display:flex;align-items:center;gap:16px;
  background:var(--bg2);border:1px solid var(--b1);
  border-radius:var(--radius-xl);padding:22px;margin-bottom:13px;
}
.p-av{
  width:60px;height:60px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--z),var(--z3));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font);font-size:22px;font-weight:800;color:#000;
  box-shadow:0 4px 16px rgba(0,240,190,.4);
}
.p-name{font-family:var(--font);font-size:20px;font-weight:800;color:var(--t0)}
.p-email{font-size:12px;color:var(--z);margin-top:2px}
.pf-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--b1)}
.pf-row:last-child{border-bottom:none}
.pf-l{font-size:12px;color:var(--t2)}
.pf-v{font-size:12px;font-weight:600;color:var(--t0)}

/* ═══════════════════════════════════════
   SETTINGS
═══════════════════════════════════════ */
.set-wrap{display:grid;grid-template-columns:195px 1fr;gap:14px}
.set-nav{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--radius-xl);padding:10px;height:fit-content}
.sni{
  display:block;padding:9px 13px;border-radius:var(--radius);
  font-size:13px;color:var(--t2);cursor:pointer;transition:.13s;
  border:none;background:none;width:100%;text-align:left;font-family:var(--body);
}
.sni:hover{background:var(--bg3);color:var(--t0)}
.sni.on{background:var(--z-dim);color:var(--z);border:1px solid var(--b3)}
.set-body{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--radius-xl);padding:24px}

/* ═══════════════════════════════════════
   DBOT
═══════════════════════════════════════ */
.blk{
  background:var(--bg3);border:1px solid var(--b1);
  border-radius:var(--radius);padding:8px 12px;
  margin-bottom:5px;cursor:grab;
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:500;color:var(--t1);transition:.13s;
}
.blk:hover{border-color:var(--z);color:var(--z)}
.blk-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ═══════════════════════════════════════
   NEWS
═══════════════════════════════════════ */
.news-item{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--b1)}
.news-item:last-child{border-bottom:none}
.ni-ic{width:40px;height:40px;border-radius:var(--radius);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ni-title{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.5;cursor:pointer;transition:.13s;color:var(--t0)}
.ni-title:hover{color:var(--z)}
.ni-meta{font-size:10px;color:var(--t2)}
.imp{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;margin-left:6px}
.imp-h{background:rgba(255,69,105,.13);color:var(--red)}
.imp-m{background:rgba(251,191,36,.11);color:var(--yellow)}
.imp-l{background:rgba(0,230,118,.09);color:var(--green)}

/* ═══════════════════════════════════════
   NOTIFICATIONS PANEL
═══════════════════════════════════════ */
.notif-panel{
  position:fixed;top:56px;right:0;width:308px;
  background:var(--bg2);border-left:1px solid var(--b1);
  border-bottom:1px solid var(--b1);
  border-radius:0 0 0 var(--radius-xl);
  padding:16px;z-index:500;
  transform:translateX(110%);transition:transform .25s ease;
  box-shadow:var(--shadow);
  max-height:calc(100vh - 56px);overflow-y:auto;
}
.notif-panel.open{transform:translateX(0)}
.notif-i{display:flex;gap:9px;padding:10px 0;border-bottom:1px solid var(--b1)}
.notif-i:last-child{border-bottom:none}
.nd{width:7px;height:7px;border-radius:50%;background:var(--z);margin-top:5px;flex-shrink:0}
.n-text{font-size:12px;line-height:1.6;color:var(--t1)}
.n-time{font-size:10px;color:var(--t3);margin-top:2px}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
#tc-wrap{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{
  display:flex;align-items:center;gap:10px;
  background:var(--bg2);border:1px solid var(--b2);
  border-radius:var(--radius-lg);padding:12px 16px;
  font-size:13px;color:var(--t0);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  transform:translateX(110%);opacity:0;
  transition:transform .28s ease,opacity .28s ease;
  max-width:310px;pointer-events:all;
}
.toast.show{transform:translateX(0);opacity:1}
.t-s{border-color:rgba(0,230,118,.4)}.t-e{border-color:rgba(255,69,105,.4)}.t-i{border-color:rgba(0,196,255,.35)}.t-w{border-color:rgba(251,191,36,.35)}
.toast-icon{font-size:15px;flex-shrink:0}

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
#mo{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:9990;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:.2s;backdrop-filter:blur(6px);
}
#mo.open{opacity:1;pointer-events:all}
.mo-box{
  background:var(--bg2);border:1px solid var(--b2);
  border-radius:var(--radius-xl);padding:26px;
  max-width:400px;width:90%;
  transform:translateY(14px);transition:.2s;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
}
#mo.open .mo-box{transform:translateY(0)}
.mo-title{font-family:var(--font);font-size:17px;font-weight:800;margin-bottom:8px;color:var(--t0)}
.mo-body{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.7}
.mo-btns{display:flex;gap:9px;justify-content:flex-end}

/* ═══════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════ */
#auth{
  position:fixed;inset:0;background:var(--bg0);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;

// ═══ CHART ENGINE ═══
function calcEMA(data,n=9){if(data.length<n)return data.slice();const k=2/(n+1);let e=data.slice(0,n).reduce((a,b)=>a+b)/n;const r=new Array(n).fill(null);r.push(e);for(let i=n;i<data.length;i++){e=data[i]*k+e*(1-k);r.push(e);}return r;}
function initTrade(){
  const m=gm(S.mkt);S.price=m.price;S.chartData=[];
  let p=m.price;const v=VOLS[S.mkt]||.5;
  for(let i=0;i<120;i++){p=Math.max(.001,p+(Math.random()-.49)*v);S.chartData.push(p);}
  compDigits();startChart(v);updateOpenPos();
}
function compDigits(){const c=new Array(10).fill(0);S.digitHist.forEach(d=>c[d]++);S.digitProbs=c.map(x=>Math.round(x/S.digitHist.length*100)||10);}
function startChart(v=.5){
  S.priceInt=setInterval(()=>{
    S.price=Math.max(.001,S.price+(Math.random()-.49)*v);
    S.chartData.push(S.price);if(S.chartData.length>200)S.chartData.shift();
    const ld=Math.floor(Math.abs(S.price*1000))%10;
    S.digitHist.push(ld);if(S.digitHist.length>60)S.digitHist.shift();
    compDigits();updatePriceUI();updateDigitUI();updateOpenPnl();
  },1000);
  function loop(){drawChart();S.rafId=requestAnimationFrame(loop);}S.rafId=requestAnimationFrame(loop);
}
function stopChart(){clearInterval(S.priceInt);S.priceInt=null;if(S.rafId){cancelAnimationFrame(S.rafId);S.rafId=null;}}
function drawChart(){
  const canvas=document.getElementById('tc');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.parentElement.offsetWidth||800,H=canvas.parentElement.offsetHeight||300;
  if(canvas.width!==W||canvas.height!==H){canvas.width=W;canvas.height=H;}
  const data=S.chartData;if(!data.length)return;
  const mn=Math.min(...data),mx=Math.max(...data);
  const range=(mx-mn)||1,pad=range*.12,lo=mn-pad,hi=mx+pad+pad;
  const toX=i=>(i/(data.length-1))*W;
  const toY=v=>H-((v-lo)/(hi-lo))*H;
  ctx.clearRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let i=1;i<5;i++){const y=H*i/5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(let i=1;i<9;i++){const x=W*i/9;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  // Price axis labels
  ctx.fillStyle='rgba(122,156,196,0.5)';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';
  for(let i=0;i<=4;i++){const vv=lo+(hi-lo)*i/4;ctx.fillText(vv.toFixed(gm(S.mkt).pip||2),W-4,H-H*i/4-4);}ctx.textAlign='left';
  // Area
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'rgba(0,240,190,0.16)');g.addColorStop(1,'rgba(0,240,190,0)');
  ctx.beginPath();ctx.moveTo(toX(0),toY(data[0]));
  data.forEach((v,i)=>{if(i>0)ctx.lineTo(toX(i),toY(v));});
  ctx.lineTo(toX(data.length-1),H);ctx.lineTo(0,H);ctx.closePath();
  ctx.fillStyle=g;ctx.fill();
  // Main line
  ctx.beginPath();ctx.moveTo(toX(0),toY(data[0]));
  data.forEach((v,i)=>{if(i>0)ctx.lineTo(toX(i),toY(v));});
  ctx.strokeStyle='#00f0be';ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
  // EMA
  if(S.indicators.includes('EMA')){
    const ema=calcEMA(data,9);ctx.beginPath();let st=false;
    ema.forEach((v,i)=>{if(v===null)return;if(!st){ctx.moveTo(toX(i),toY(v));st=true;}else ctx.lineTo(toX(i),toY(v));});
    ctx.strokeStyle='rgba(139,92,246,0.8)';ctx.lineWidth=1.2;ctx.stroke();
  }
  if(S.indicators.includes('SMA')){
    const per=20;ctx.beginPath();let st=false;
    for(let i=per-1;i<data.length;i++){const avg=data.slice(i-per+1,i+1).reduce((a,b)=>a+b)/per;if(!st){ctx.moveTo(toX(i),toY(avg));st=true;}else ctx.lineTo(toX(i),toY(avg));}
    ctx.strokeStyle='rgba(251,191,36,0.7)';ctx.lineWidth=1.2;ctx.stroke();
  }
  if(S.indicators.includes('BB')){
    const per=20;
    ['top','bot'].forEach(side=>{
      ctx.beginPath();let st=false;
      for(let i=per-1;i<data.length;i++){const sl=data.slice(i-per+1,i+1);const avg=sl.reduce((a,b)=>a+b)/per;const std=Math.sqrt(sl.reduce((a,b)=>a+(b-avg)**2,0)/per);const y=toY(side==='top'?avg+2*std:avg-2*std);if(!st){ctx.moveTo(toX(i),y);st=true;}else ctx.lineTo(toX(i),y);}
      ctx.strokeStyle='rgba(0,196,255,0.4)';ctx.lineWidth=1;ctx.stroke();
    });
  }
  // Last price dot + label
  const lx=toX(data.length-1),ly=toY(S.price);
  ctx.beginPath();ctx.arc(lx,ly,7,0,Math.PI*2);ctx.fillStyle='rgba(0,240,190,0.18)';ctx.fill();
  ctx.beginPath();ctx.arc(lx,ly,3.5,0,Math.PI*2);ctx.fillStyle='#00f0be';ctx.fill();
  ctx.fillStyle='rgba(0,240,190,0.92)';ctx.fillRect(W-72,ly-10,70,20);
  ctx.fillStyle='#000';ctx.font='bold 10px DM Mono,monospace';ctx.textAlign='center';
  ctx.fillText(S.price.toFixed(gm(S.mkt).pip||2),W-37,ly+4);ctx.textAlign='left';
  ctx.setLineDash([3,5]);ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W-74,ly);
  ctx.strokeStyle='rgba(0,240,190,0.22)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
}

  S.openPos.splice(idx,1);updateOpenPos();

function placeTrade(dir){
  const stake=parseFloat(document.getElementById('s-inp')?.value)||S.stake;
  const bal=getBal();
  if(stake<=0){toast('Enter a valid stake amount','e');return;}
  if(stake>bal){toast('Insufficient balance!','e');return;}
  const m=gm(S.mkt);
  showModal(`Confirm ${dir.toUpperCase()} Trade`,`Place $${stake.toFixed(2)} ${dir.toUpperCase()} on ${m.name}?\n\nPotential payout: $${(stake*1.85).toFixed(2)}`,()=>{
    setBal(Math.max(0,bal-stake));updateBal();
    const posId=Date.now();
    S.openPos.push({id:posId,mkt:m.id,mktId:m.id,dir,stake,entry:S.price});
    updateOpenPos();
    const dur=3000+Math.random()*5000;
    toast(`Trade placed — resolves in ~${Math.round(dur/1000)}s...`,'i');
    setTimeout(()=>{
      const idx=S.openPos.findIndex(p=>p.id===posId);if(idx>=0)S.openPos.splice(idx,1);
      const win=Math.random()>.46;const pnl=win?stake*.85:-stake;
      if(win)setBal(getBal()+(stake*1.85));
      updateBal();
      S.trades.unshift({id:Date.now(),time:new Date().toLocaleTimeString(),date:new Date().toLocaleDateString(),mkt:m.name,mktId:m.id,dir,stake,payout:win?stake*1.85:0,pnl,win,acct:S.acct});
      updateOpenPos();
      if(win)toast(`✓ WON! +$${(stake*.85).toFixed(2)} profit 🎉`,'s');
      else toast(`Trade lost. −$${stake.toFixed(2)}`,'e');
      if(S.pg==='dashboard')nav('dashboard');
    },dur);
  });
}

function changeMkt(id){S.mkt=id;stopChart();nav('trade');}

function setTF(t){S.tf=t;document.querySelectorAll('.tf-btn').forEach(b=>b.classList.toggle('on',b.textContent===t));}
function setTTab(t){S.tradeTab=t;document.querySelectorAll('.tp-tab').forEach((b,i)=>b.classList.toggle('on',['binary','multiplier','accum'][i]===t));}
function setTMode(m){S.tradeMode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('on',b.textContent.trim().toLowerCase().startsWith(m[0])));}
function setTType(t){S.tradeType=t;document.querySelectorAll('.ty-chip').forEach(b=>b.classList.toggle('on',b.textContent===t));}
function setStake(v){S.stake=v;const e=document.getElementById('s-inp');if(e)e.value=v;updatePayoutUI();}
function toggleInd(ind){const i=S.indicators.indexOf(ind);if(i>=0)S.indicators.splice(i,1);else S.indicators.push(ind);document.querySelectorAll('.ct-btn').forEach(b=>{if(['EMA','SMA','BB','RSI'].includes(b.textContent))b.classList.toggle('on',S.indicators.includes(b.textContent));});}
function setPPTab(btn,lid,tab){
  document.querySelectorAll('.pp-tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  document.getElementById('op-list').style.display=tab==='open'?'':'none';
  document.getElementById('cl-list').style.display=tab==='closed'?'':'none';
  if(tab==='closed'){const e=document.getElementById('cl-list');e.innerHTML=S.trades.length===0?`<div style="text-align:center;padding:18px;font-size:10px;color:var(--t3)">No history</div>`:S.trades.slice(0,6).map(t=>`<div class="pos-row"><div class="pd ${t.dir}">${t.dir==='rise'?'▲':'▼'}</div><div style="font-size:10px;font-weight:700;color:var(--t0)">${t.mktId||t.mkt}</div><div style="font-size:9px;color:var(--t2)">${t.time}</div><div class="th-pnl ${t.win?'w':'l'}">${t.win?'+':'−'}$${Math.abs(t.pnl).toFixed(2)}</div><span class="bdg ${t.win?'bg':'br'}" style="font-size:8px">${t.win?'WIN':'LOSS'}</span></div>`).join('');}
}

function toggleMob(){document.getElementById('sidebar').classList.toggle('mob-open');}
function toggleTheme(){
  S.light=!S.light;document.body.classList.toggle('lt',S.light);
  document.getElementById('theme-lbl').textContent=S.light?'Dark Mode':'Light Mode';

function toggleNotif(){S.notifOpen=!S.notifOpen;document.getElementById('np').classList.toggle('open',S.notifOpen);if(S.notifOpen){S.notifs.forEach(n=>n.read=true);buildNotifList();}}

// ═══ TOAST ═══
function toast(msg,type='s'){
  const icons={s:'✓',e:'✕',i:'ℹ',w:'⚠'};
  const cls={s:'t-s',e:'t-e',i:'t-i',w:'t-w'};
  const tc=document.getElementById('tc-wrap');
  const el=document.createElement('div');
  el.className=`toast ${cls[type]||'t-i'}`;
  el.innerHTML=`<span class="toast-icon">${icons[type]||'•'}</span><span style="line-height:1.5;color:var(--t0)">${msg}</span>`;
  tc.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},3600);
}

// ═══ MODAL ═══
let _mcb=null;
function showModal(title,body,onConfirm){
  document.getElementById('mo-title').textContent=title;
  document.getElementById('mo-body').textContent=body;
  document.getElementById('mo').classList.add('open');
  _mcb=onConfirm;
  document.getElementById('mo-ok').onclick=()=>{closeModal();if(_mcb)_mcb();};
}
function closeModal(){document.getElementById('mo').classList.remove('open');}

// ═══ INIT ═══
showAuth('login');
document.addEventListener('click',e=>{
  if(S.notifOpen&&!document.getElementById('np').contains(e.target)&&!e.target.closest('[title="Notifications"]')){S.notifOpen=false;document.getElementById('np').classList.remove('open');}
  const sb=document.getElementById('sidebar');
  if(sb&&sb.classList.contains('mob-open')&&!sb.contains(e.target)&&!e.target.closest('#mob-btn')){sb.classList.remove('mob-open');}
});
</script>
